name: codec_gen
description: "Code generator for the codec package: reads @Codable / @CodecEnum annotations and generates type-safe JSON codec fields with $.path error locations, via build_runner."
version: 0.2.0
repository: https://github.com/Vincen-dev/codec/tree/main/packages/codec_gen
issue_tracker: https://github.com/Vincen-dev/codec/issues

topics:
  - json
  - codec
  - code-generation
  - build-runner
  - serialization

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  analyzer: ^13.3.0
  build: ^4.0.6
  source_gen: ^4.2.3
  dart_style: ^3.0.0
  codec: ^0.2.0

dev_dependencies:
  build_runner: ^2.4.0
  build_test: ^3.5.15
  test: ^1.25.0
  lints: ^6.1.0
