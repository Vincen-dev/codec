name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1

      - name: Resolve workspace
        run: dart pub get

      - name: Analyze codec
        run: dart analyze
        working-directory: packages/codec
      - name: Analyze codec_gen
        run: dart analyze
        working-directory: packages/codec_gen
      - name: Analyze codec_example
        run: dart analyze
        working-directory: packages/codec_example

      - name: Test codec
        run: dart test
        working-directory: packages/codec
      - name: Test codec_gen
        run: dart test
        working-directory: packages/codec_gen

      - name: Regenerate codec_example
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: packages/codec_example

      # Drift guard: committed .g.dart must match a fresh regeneration, and no
      # generated file may be left untracked. Stage everything under the package,
      # then assert the staged tree has no changes — this catches BOTH modified
      # committed files AND newly generated-but-uncommitted ones (a plain
      # `git diff` ignores untracked files). Runs from the repo root.
      - name: Drift guard (committed .g.dart must match regeneration)
        run: |
          git add -A packages/codec_example
          git diff --cached --exit-code -- packages/codec_example

      - name: Test codec_example (roundtrip)
        run: dart test
        working-directory: packages/codec_example
