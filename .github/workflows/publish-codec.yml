name: Publish codec to pub.dev

# Triggered only by tags of the form codec-vX.Y.Z (numeric semver glob).
# This pattern must match the "Tag pattern" configured on
# pub.dev/packages/codec/admin -> Automated publishing (codec-v{{version}}).
on:
  push:
    tags:
      - 'codec-v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    permissions:
      id-token: write  # Required for OIDC authentication to pub.dev
      contents: read
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@65eb853c7ba17dde3be364c3d2858773e7144260  # v1
    with:
      working-directory: packages/codec